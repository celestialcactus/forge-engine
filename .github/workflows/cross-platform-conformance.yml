name: Cross-platform conformance

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  conformance:
    name: Node 22 / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Typecheck, test, and build
        run: npm run check

      - name: Exercise packaged CLI
        run: npm run smoke
